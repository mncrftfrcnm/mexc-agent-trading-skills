name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Self-tests, compile, and secret scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Go for gitleaks install
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@latest

      - name: Install TruffleHog
        run: curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

      - name: Run MEXC Spot REST self-test
        run: python codex_mexc_skills/skills/mexc-spot-rest/scripts/mexc_spot_request.py --self-test

      - name: Run MEXC Futures REST self-test
        run: python codex_mexc_skills/skills/mexc-futures-rest/scripts/mexc_futures_request.py --self-test

      - name: Compile Python files
        run: python -m compileall codex_mexc_skills claude_mexc_skills

      - name: Run gitleaks secret scan
        run: gitleaks git --verbose --redact .

      - name: Run TruffleHog verified secret scan
        run: trufflehog git file://. --results=verified --fail --github-actions
        
     - name: First interaction
        uses: actions/first-interaction@v1.3.0
        with:
          # Token for the repository. Can be passed in using {{ secrets.GITHUB_TOKEN }}
          repo-token: 
          # Comment to post on an individual's first issue
          issue-message: # optional
          # Comment to post on an individual's first pull request
          pr-message: # optional
          
